backend:
  name: git-gateway
  branch: main

logo_url: https://gridironbloodlines.com/favicon.svg

# Where uploaded images go in the repo
media_folder: public/uploads
# How they're referenced in the site
public_folder: /uploads

# Only show the CMS to logged-in users
publish_mode: simple

collections:

  # ── Site Settings ─────────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - file: "src/data/settings.json"
        label: "General Settings"
        name: "general"
        fields:
          - { label: "Season Label",    name: "season_label",   widget: "string", hint: "Shown in the hero, e.g. Season 1 · Now Forming" }
          - { label: "League Tagline",  name: "league_tagline", widget: "text" }
          - { label: "Sleeper Link",    name: "sleeper_link",   widget: "string" }
          - { label: "Discord Link",    name: "discord_link",   widget: "string" }
          - label: "Show Announcement Banner"
            name: "announcement_enabled"
            widget: "boolean"
            default: false
          - { label: "Announcement Text", name: "announcement_text", widget: "text", required: false, hint: "Shown as a red banner at the top of every page when enabled" }
          - label: "Quick Stats Bar"
            name: "quick_stats"
            widget: "list"
            summary: "{{fields.val}} — {{fields.label}}"
            fields:
              - { label: "Value",  name: "val",   widget: "string", hint: "e.g. 14 or $50" }
              - { label: "Label",  name: "label", widget: "string", hint: "e.g. Teams or Annual Dues" }
          - label: "Commissioners"
            name: "commissioners"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Initials", name: "initials", widget: "string", hint: "2-3 letters shown large" }
              - { label: "Name",     name: "name",     widget: "string" }
              - { label: "Phone",    name: "phone",    widget: "string", required: false }
              - { label: "Discord",  name: "discord",  widget: "string", required: false }
              - { label: "Email",    name: "email",    widget: "string" }
          - label: "Preseason Checklist"
            name: "checklist"
            widget: "list"
            summary: "{{fields.num}} — {{fields.title}}"
            fields:
              - { label: "Step Number", name: "num",   widget: "string", hint: "e.g. 01" }
              - { label: "Title",       name: "title", widget: "string" }
              - { label: "Description", name: "desc",  widget: "text" }

  # ── Hall of Fame ───────────────────────────────────────────────────
  - name: "hof"
    label: "Hall of Fame"
    files:
      - file: "src/data/hof.json"
        label: "Hall of Fame Data"
        name: "hof"
        fields:
          - label: "HOF Inductees"
            name: "inductees"
            widget: "list"
            required: false
            summary: "{{fields.name}} ({{fields.year}})"
            fields:
              - { label: "Name",        name: "name",  widget: "string" }
              - { label: "Induction Year", name: "year", widget: "string", hint: "e.g. 2028" }
              - { label: "Team",        name: "team",  widget: "string", required: false }
              - { label: "Note",        name: "note",  widget: "text",   required: false, hint: "Achievement summary" }
              - { label: "Photo",       name: "photo", widget: "image",  required: false }
          - label: "Rivalries"
            name: "rivalries"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Rivalry Name", name: "name",  widget: "string" }
              - { label: "Teams",        name: "teams", widget: "string", hint: "e.g. Walker vs. Chris" }
              - { label: "Description",  name: "desc",  widget: "text" }
          - label: "Record Categories"
            name: "records"
            widget: "list"
            summary: "{{fields.category}}"
            fields:
              - { label: "Category Name", name: "category", widget: "string" }
              - label: "Records"
                name: "entries"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Record",  name: "label",  widget: "string" }
                  - { label: "Holder",  name: "holder", widget: "string", default: "—", hint: "Team or coach name" }
                  - { label: "Value",   name: "value",  widget: "string", default: "—", hint: "e.g. 284.5 pts" }

  # ── Teams ─────────────────────────────────────────────────────────
  - name: "teams"
    label: "Teams"
    files:
      - file: "src/data/teams.json"
        label: "Team Profiles"
        name: "teams"
        fields:
          - label: "Teams"
            name: "teams"
            widget: "list"
            summary: "{{fields.name}} ({{fields.conference}} · {{fields.division}})"
            fields:
              - { label: "Team ID (number)",  name: "id",         widget: "number", value_type: "int" }
              - { label: "URL Slug",          name: "slug",        widget: "string", hint: "URL-friendly ID, e.g. hill-country-rocket-coyotes" }
              - { label: "Full Team Name",    name: "name",        widget: "string" }
              - { label: "Nickname",          name: "nickname",    widget: "string", required: false, hint: "Short nickname, e.g. Ro-Yotes" }
              - { label: "Head Coach",        name: "coach",       widget: "string" }
              - { label: "Team Logo",         name: "logo",        widget: "image",  required: false }
              - label: "Conference"
                name: "conference"
                widget: "select"
                options: ["AFC", "NFC"]
              - label: "Division"
                name: "division"
                widget: "select"
                options: ["North", "South", "East", "West"]
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["active", "pending", "inactive"]
                default: "pending"
              - { label: "Region",            name: "region",      widget: "string",  required: false, hint: "e.g. Texas Hill Country" }
              - { label: "Home Stadium",      name: "stadium",     widget: "string",  required: false }
              - { label: "Founded",           name: "founded",     widget: "string",  required: false, hint: "e.g. 2026" }
              - { label: "Team Colors",       name: "colors",      widget: "string",  required: false, hint: "e.g. Royal Blue, White, Silver" }
              - { label: "Owner",             name: "owner",       widget: "string",  required: false }
              - { label: "Founder",           name: "founder",     widget: "string",  required: false }
              - { label: "General Manager",   name: "gm",          widget: "string",  required: false }
              - { label: "Team Motto",        name: "motto",       widget: "string",  required: false }
              - label: "Sponsors"
                name: "sponsors"
                widget: "list"
                required: false
                summary: "{{fields.name}}"
                fields:
                  - { label: "Sponsor Name", name: "name", widget: "string" }
                  - { label: "Sponsor Logo", name: "logo", widget: "image", required: false }
              - { label: "Primary Brand Mark",  name: "brand_primary",   widget: "image", required: false, hint: "Main logo / mascot image" }
              - { label: "Monogram",            name: "brand_monogram",  widget: "image", required: false }
              - { label: "Wordmark",            name: "brand_wordmark",  widget: "image", required: false }
              - { label: "Uniforms Image",      name: "uniforms_image",  widget: "image", required: false }
              - { label: "Coaching Staff",      name: "coaching_staff",  widget: "text",  required: false, hint: "List coaches and roles" }
              - { label: "Active Roster",       name: "roster",          widget: "text",  required: false, hint: "List player names" }

  # ── Bloodline Bowl Champions ───────────────────────────────────────
  - name: "champions"
    label: "Champions"
    files:
      - file: "src/data/champions.json"
        label: "Bloodline Bowl Champions"
        name: "champions"
        fields:
          - label: "Champions"
            name: "champions"
            widget: "list"
            summary: "{{fields.season}} — {{fields.champion}}"
            fields:
              - { label: "Season",        name: "season",   widget: "string", hint: "e.g. 2026" }
              - { label: "Champion Team", name: "champion", widget: "string" }
              - { label: "Coach",         name: "coach",    widget: "string" }
              - { label: "Opponent",      name: "opponent", widget: "string" }
              - { label: "Final Score",   name: "score",    widget: "string", hint: "e.g. 142.5 - 118.2" }

  # ── Season Standings ──────────────────────────────────────────────
  - name: "standings"
    label: "Season Stats"
    files:
      - file: "src/data/standings.json"
        label: "Standings"
        name: "standings"
        fields:
          - label: "Standings"
            name: "standings"
            widget: "list"
            summary: "{{fields.season}} — #{{fields.rank}} {{fields.team}}"
            fields:
              - { label: "Season",          name: "season",  widget: "string", hint: "e.g. 2026" }
              - { label: "Rank",            name: "rank",    widget: "number", value_type: "int" }
              - { label: "Team",            name: "team",    widget: "string" }
              - { label: "Coach",           name: "coach",   widget: "string" }
              - { label: "Wins",            name: "w",       widget: "number", value_type: "int" }
              - { label: "Losses",          name: "l",       widget: "number", value_type: "int" }
              - { label: "Points For",      name: "pf",      widget: "number", value_type: "float" }
              - { label: "Points Against",  name: "pa",      widget: "number", value_type: "float" }
              - { label: "Streak",          name: "streak",  widget: "string", hint: "e.g. W3 or L1" }

  # ── Draft Results ─────────────────────────────────────────────────
  - name: "draft"
    label: "Draft"
    files:
      - file: "src/data/draft.json"
        label: "Draft Picks"
        name: "draft"
        fields:
          - label: "Picks"
            name: "picks"
            widget: "list"
            summary: "#{{fields.pick}} — {{fields.player}} ({{fields.team}})"
            fields:
              - { label: "Overall Pick", name: "pick",      widget: "number", value_type: "int" }
              - { label: "Team",         name: "team",      widget: "string" }
              - { label: "Player",       name: "player",    widget: "string" }
              - { label: "Position",     name: "position",  widget: "string", hint: "e.g. QB, RB, WR, TE, K" }
              - { label: "NFL Team",     name: "nfl_team",  widget: "string" }

  # ── Weekly Updates ────────────────────────────────────────────────
  - name: "weekly_updates"
    label: "Weekly Updates"
    files:
      - file: "src/data/weekly-updates.json"
        label: "Reports"
        name: "weekly_updates"
        fields:
          - label: "Reports"
            name: "reports"
            widget: "list"
            summary: "{{fields.season}} — {{fields.label}}"
            fields:
              - { label: "Season",     name: "season",  widget: "string", hint: "e.g. 2026" }
              - { label: "Week",       name: "week",    widget: "number", value_type: "int" }
              - { label: "Label",      name: "label",   widget: "string", hint: "e.g. Week 1 or Wildcard" }
              - { label: "Report Link", name: "link",   widget: "string", required: false, hint: "Paste the Sleeper or Google Docs link" }

  # ── GB.tv Videos ──────────────────────────────────────────────────
  - name: "videos"
    label: "GB.tv"
    files:
      - file: "src/data/videos.json"
        label: "Videos"
        name: "videos"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "YouTube Video ID", name: "id",     widget: "string", hint: "The part after ?v= in the YouTube URL" }
              - { label: "Title",            name: "title",  widget: "string" }
              - { label: "Season",           name: "season", widget: "string", hint: "e.g. 2026" }
              - label: "Type"
                name: "type"
                widget: "select"
                options:
                  - { label: "Season Trailer", value: "trailer" }
                  - { label: "Weekly Update",  value: "weekly" }
                  - { label: "Highlight",      value: "highlight" }
                  - { label: "Other",          value: "other" }

  # ── Sponsors ──────────────────────────────────────────────────────
  - name: "sponsors"
    label: "Sponsors"
    files:
      - file: "src/data/sponsors.json"
        label: "Sponsors"
        name: "sponsors"
        fields:
          - label: "Sponsors"
            name: "sponsors"
            widget: "list"
            summary: "{{fields.name}} ({{fields.tier}})"
            fields:
              - { label: "Name",        name: "name",        widget: "string" }
              - label: "Tier"
                name: "tier"
                widget: "select"
                options: ["Primary Sponsor", "Community Sponsor", "Media Partner", "Supporting Sponsor"]
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link URL",    name: "link",        widget: "string" }
              - { label: "Link Label",  name: "linkLabel",   widget: "string", hint: "Button text, e.g. Visit Us" }
